<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emirhan Altuner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  /* Founders Grotesk in production (drop files in ../../fonts/), Space Grotesk preview fallback */
  @font-face{font-family:"FoundersGrotesk";font-weight:400;font-style:normal;src:url("../../fonts/FoundersGrotesk-Regular.otf") format("opentype")}
  @font-face{font-family:"FoundersGrotesk";font-weight:400;font-style:italic;src:url("../../fonts/FoundersGrotesk-Italic.otf") format("opentype")}
  @font-face{font-family:"FoundersGrotesk";font-weight:700;font-style:normal;src:url("../../fonts/FoundersGrotesk-Bold.otf") format("opentype")}
  @font-face{font-family:"FoundersGrotesk";font-weight:700;font-style:italic;src:url("../../fonts/FoundersGrotesk-BoldItalic.otf") format("opentype")}

  :root{
    --bg:#f5f0eb;--orange:#e84a1a;--text-dark:#1a1a1a;--border:#e0c4b8;--peach:#f0d8cc;
    --content-width:860px;--font:"FoundersGrotesk","Space Grotesk",sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scrollbar-gutter:stable}
  body{background:var(--bg);font-family:var(--font);color:var(--orange);min-height:100vh;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;background:none;border:none;cursor:pointer;color:inherit}
  .wrap{max-width:var(--content-width);margin:0 auto;padding:0 24px}

  /* ---- HEADER ---- */
  .hdr{padding:28px 0}
  .hdr-inner{display:flex;align-items:center;position:relative}
  .logo{width:64px;height:64px;border-radius:50%;background:var(--peach);border:1.5px solid var(--border);
        display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s ease}
  .logo:hover{opacity:.6}
  .logo span{font-weight:700;font-size:20px;color:var(--orange);letter-spacing:-.02em}
  .hdr-nav{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:48px}
  .navlink{font-size:1rem;color:var(--orange);text-decoration:none;cursor:pointer;transition:opacity .15s ease}
  .navlink:hover{opacity:.6}
  .navlink.active{text-decoration:underline;text-underline-offset:3px}

  /* ---- HOME ---- */
  .home{display:flex;flex-direction:column;align-items:center;padding-top:48px}
  .home-logo{width:110px;height:110px;border-radius:50%;background:var(--peach);border:1.5px solid var(--border);
             display:flex;align-items:center;justify-content:center;margin-bottom:28px;transition:opacity .15s ease}
  .home-logo:hover{opacity:.6}
  .home-logo span{font-weight:700;font-size:32px;color:var(--orange);letter-spacing:-.02em}
  .home-nav{display:flex;gap:48px;margin-bottom:36px}
  .hn{font-size:1rem;color:var(--orange);text-decoration:none;cursor:pointer;padding:3px 10px;transition:opacity .15s ease}
  .hn:hover{opacity:.6}
  .hn.active{border:1.5px solid var(--orange)}
  .home-box{width:100%;max-width:var(--content-width);border:1.5px solid var(--orange);border-radius:14px;min-height:460px;margin:0 24px}

  /* ---- PROJECTS ---- */
  .filter-bar{display:flex;align-items:baseline;gap:40px;padding:28px 0 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .filt{font-weight:400;font-size:.95rem;color:var(--orange);opacity:.55;letter-spacing:.01em;transition:opacity .15s ease}
  .filt:hover{opacity:1}
  .filt.active{font-weight:700;opacity:1}
  .works{width:100%;border-collapse:collapse}
  .works tr{border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .12s ease}
  .works tr:hover{opacity:.6}
  .works td{padding:15px 0;font-weight:700;font-size:.95rem;color:var(--orange)}
  .works td.ttl{width:42%;padding-left:80px}
  .works td.yr{width:100px;font-weight:100}

  /* ---- DETAIL ---- */
  .back{font-weight:400;font-size:.9rem;color:var(--orange);opacity:.6;padding:28px 0 0;display:block;transition:opacity .15s ease}
  .back:hover{opacity:1}
  .detail-title{font-weight:700;font-size:2.5rem;color:var(--text-dark);margin:32px 0 16px;line-height:1.1;letter-spacing:-.01em}
  .detail-meta{display:flex;align-items:center;gap:14px;font-weight:700;font-size:.95rem;color:var(--text-dark);margin-bottom:14px;flex-wrap:wrap}
  .detail-meta .sep{color:var(--border)}
  .detail-meta .disc{font-weight:400}
  .detail-meta .loc{font-weight:700}
  .detail-meta .loc-venue{letter-spacing:.02em}
  .detail-meta .loc-dot{padding:0 .12em}
  .detail-links{display:flex;gap:20px;margin-bottom:32px}
  .dlink{font-weight:400;font-size:.88rem;color:var(--orange);opacity:.55;text-decoration:none;cursor:pointer;transition:opacity .15s ease}
  .dlink:hover{opacity:1}
  .detail-body{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:start;margin-bottom:28px}
  .detail-image{background:var(--peach);border-radius:8px;aspect-ratio:4/3}
  .detail-text{font-weight:700;font-size:1rem;line-height:1.7;color:var(--text-dark)}
  .detail-text em{font-style:italic}
  .detail-image-wide{border:1.5px solid var(--border);border-radius:10px;width:100%;aspect-ratio:16/6;margin-bottom:60px}

  /* ---- INFO (about / contact) — centered column on the page, starts at 250px ---- */
  .info{width:1400px;max-width:calc(100% - 112px);margin:0 auto;padding:220px 0 120px;
        display:flex;flex-direction:column;align-items:center}
  .info-h{font-weight:700;font-size:1.4rem;color:var(--text-dark);margin-bottom:24px;text-align:center}
  .info p{font-weight:400;font-size:1rem;line-height:1.8;color:var(--text-dark);
          margin-bottom:16px;max-width:520px;text-align:center}
  .info a{color:var(--orange);text-decoration:underline;text-underline-offset:2px}
  .bio-link{cursor:pointer}
  .bio-link em{font-style:italic}

  /* ---- AWARDS (About page) ---- */
  .awards{width:100%;max-width:520px;margin-top:52px}
  .awards-h{font-weight:700;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;
            color:var(--text-dark);margin-bottom:26px;text-align:left}
  .award{margin-bottom:24px;text-align:left}
  .award:last-child{margin-bottom:0}
  .award-meta{font-weight:700;font-size:1rem;line-height:1.5;color:var(--text-dark)}
  .award-meta .sep{color:var(--border);margin:0 9px}
  .award-desc{font-weight:400;font-size:1rem;line-height:1.7;color:var(--text-dark);
              opacity:.8;margin-top:5px}
  .award-desc em{font-style:italic}

  /* ---- HOME (landing: one large rotating visual anchored flush to the BOTTOM of the
          screen, shown at its NATURAL ratio — never cropped or stretched. Cream space
          fills above/beside it seamlessly. Title sits on the image, bottom-left.) ---- */
  .home-hero{padding-top:170px;padding-bottom:0;display:flex;justify-content:center;width:100%}
  .home-stage{position:relative;width:calc(100% - 120px);max-width:2200px;cursor:default;
              height:calc(100vh - 200px);min-height:460px}
  /* regular-photo box: 3:2, centered, anchored to the stage bottom. Sized by HEIGHT so
     it fills the available stage but NEVER exceeds it — that keeps the 250px top gap
     intact instead of overflowing past the top of the screen. Capped at 1400px wide. */
  .home-figure{position:absolute;left:50%;bottom:0;transform:translateX(-50%);
               height:100%;max-height:933px;width:auto;aspect-ratio:3/2;max-width:100%}
  .home-figure image-slot{position:absolute;inset:0;width:100%;height:100%;display:block;
                          opacity:0;pointer-events:none;transition:opacity .7s ease}
  .home-figure image-slot.on{opacity:1;pointer-events:auto;z-index:2}
  /* empty (image-less) slots blend fully into the cream — no grey fill, no dashed ring,
     no prompt. Drag-and-drop still works anywhere on the stage; a drag shows feedback. */
  .home-figure image-slot::part(frame){background:transparent}
  .home-figure image-slot::part(ring){display:none}
  .home-figure image-slot::part(empty){opacity:0}
  /* subtle prev/next — only on hover; lets you jump to any project to fill it */
  .home-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;
            font-size:2.4rem;line-height:1;color:var(--orange);opacity:0;padding:14px;
            background:none;transition:opacity .15s ease}
  .home-stage:hover .home-nav{opacity:.5}
  .home-nav:hover{opacity:1}
  .home-nav.prev{left:10px}
  .home-nav.next{right:10px}
  .home-cap{position:absolute;right:0;bottom:0;z-index:4;margin:0 26px 22px 0;font-size:1rem;
            color:var(--bg);text-decoration:underline;text-underline-offset:3px;
            letter-spacing:.005em;cursor:pointer;transition:opacity .25s ease}
  .home-cap:hover{opacity:.6}

  /* ---- HEADER (all pages; absolute over the top band so content begins at a fixed offset) ---- */
  .app{position:relative;min-height:100vh}
  .topbar{position:fixed;top:0;left:0;right:0;z-index:20;
          display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:24px;
          padding:5px 56px;width:100%;background:var(--bg)}
  .topbar.scrolled{border-bottom:1px solid var(--border)}
  .topbar-logo{width:64px;height:64px;padding:0;background:none;cursor:pointer;
               justify-self:start;transition:opacity .15s ease}
  .topbar-logo:hover{opacity:.6}
  .topbar-logo image-slot{width:100%;height:100%;display:block}
  .topbar-logo image-slot::part(frame){background:transparent}
  .topbar-center{justify-self:center;display:flex;align-items:center;gap:35px;
                 flex-wrap:wrap;justify-content:center}
  .topbar-right{justify-self:end;display:flex;align-items:center;gap:34px}
  .tf{position:relative;display:inline-flex;align-items:center;line-height:1.15;
      font-size:1rem;color:var(--orange);opacity:.55;letter-spacing:.01em;cursor:pointer;
      background:none;border:0;font-family:inherit;text-decoration:none;transition:opacity .15s ease}
  .tf:hover{opacity:1}
  .tf.active{opacity:1;font-weight:700}
  .tf .caret{position:absolute;top:100%;left:50%;transform:translateX(-50%);
             margin-top:2px;font-size:.85rem;line-height:1;transition:transform .15s ease}
  .tf .caret.caret-up{transform:translateX(-50%) translateY(7px) rotate(180deg)}
  /* reserve the BOLD width at all weights so the active state never shifts siblings */
  .tf .tlabel{display:inline-grid;align-items:center}
  .tf .tlabel > span{grid-area:1/1;white-space:nowrap}
  .tf .tlabel::after{content:attr(data-t);grid-area:1/1;font-weight:700;
                     visibility:hidden;white-space:nowrap}

  /* ---- WIDE CONTENT (detail) ---- */
  .wrap-wide{max-width:1600px;margin:0 auto;padding:0 56px}

  /* ---- PROJECTS (works table: 1400 frame, 1100 text area) ---- */
  .projects{width:1400px;max-width:calc(100% - 112px);margin:0 auto;padding-top:220px}
  .works2{width:1100px;max-width:100%;margin:0 auto;border-top:1px solid var(--border)}
  .work-row{display:grid;grid-template-columns:340px 90px 1fr;align-items:baseline;
            border-bottom:1px solid var(--border);padding:20px 50px;cursor:pointer;
            transition:opacity .12s ease}
  .work-row:hover{opacity:.55}
  .work-row > div{font-size:15px;color:var(--orange)}
  .w-ttl{font-weight:700}
  .w-yr{font-weight:400}
  .w-tags{font-weight:500;text-align:left;width:360px;justify-self:end}
  .work-row.empty{cursor:default;pointer-events:none;min-height:22px}
  .work-row.is-draft{opacity:.5}
  .work-row.is-draft:hover{opacity:.8}
  .draft-tag{display:inline-block;margin-left:12px;font-weight:500;font-size:11px;
             letter-spacing:.06em;text-transform:uppercase;color:var(--orange);
             border:1px solid var(--border);border-radius:3px;padding:1px 6px;
             vertical-align:middle;opacity:.85}

  /* ---- DETAIL HEADER (220px title area; 50px title→meta→links rhythm) ---- */
  .wrap-wide.detail-wide{display:flex;flex-direction:column;align-items:center;padding-top:190px}
  .detail-wide > *{display:flex;flex-direction:column;align-items:flex-start}
  .detail-head{margin-bottom:64px}
  .detail-wide .detail-title{font-size:clamp(2.8rem,5.2vw,5rem);margin:0 0 25px;
                             line-height:1.02;letter-spacing:-.015em}
  .detail-wide .detail-meta{font-size:1.08rem;gap:16px;margin:0 0 50px}
  .detail-wide .detail-links{gap:22px;margin-bottom:0}
  .detail-wide .dlink{font-size:1rem}

  /* ---- HEADER EDITING (Edit mode) — click-to-edit affordances ---- */
  .editable{outline:none;cursor:text;border-radius:2px;transition:box-shadow .12s ease,background .12s ease}
  .editing-head .editable{box-shadow:inset 0 -1px 0 var(--ovl-line)}
  .editing-head .editable:hover{background:rgba(232,74,26,.05)}
  .editing-head .editable:focus{background:rgba(232,74,26,.07);box-shadow:inset 0 -1.5px 0 var(--orange)}
  .editable[data-empty="true"]:not(:focus)::before{content:attr(data-placeholder);opacity:.4;font-style:italic}
  .detail-wide .meta-edit{display:inline-block;min-width:1ch}
  /* Links editor: each row is label + href input + delete, with an add button */
  .detail-links.editing-links{flex-wrap:wrap;gap:14px 22px;align-items:center}
  .dlink-edit{display:inline-flex;align-items:center;gap:8px}
  .dlink-edit .dlink-label{display:inline-block;min-width:3ch}
  .dlink-href{font-family:inherit;font-size:.82rem;color:var(--text-dark);background:transparent;
              border:1px solid var(--border);border-radius:4px;padding:4px 8px;width:180px;outline:none;
              transition:border-color .12s ease}
  .dlink-href:focus{border-color:var(--orange)}
  .dlink-href::placeholder{color:var(--text-dark);opacity:.35}
  .dlink-del{appearance:none;border:1px solid var(--border);background:transparent;color:var(--orange);
             width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:14px;line-height:1;
             display:inline-flex;align-items:center;justify-content:center;opacity:.6;transition:opacity .12s ease}
  .dlink-del:hover{opacity:1;border-color:var(--orange)}
  .dlink-add{appearance:none;border:1px dashed var(--border);background:transparent;color:var(--orange);
             font-family:inherit;font-size:.85rem;padding:5px 12px;border-radius:4px;cursor:pointer;
             opacity:.7;transition:opacity .12s ease,border-color .12s ease}
  .dlink-add:hover{opacity:1;border-color:var(--orange)}

  /* ---- PROJECT MEDIA GRID — 2D coordinate placement ---- */
  /* Each project's `layout` is a flat list of blocks. A block is text OR an image
     placed by column (x: 1..cols, left edge) and row (y, vertical unit). Widths are
     standard px (400–1200, step 100); image height follows its aspect ratio; text
     height follows its content. Toggle the overlay/edit tools from the Tweaks panel. */
  :root{--ovl-line:#e0c4b8;--ovl-faint:#ece0d8}
  /* Grid is flush-left with the page (and the detail header above it); the row-number
     labels float into the page margin via negative offset, so nothing is pushed right. */
  .grid-wrap{position:relative;padding-left:0}
  .grid-canvas{position:relative;margin:0}
  .grid-ovl{position:absolute;inset:0;pointer-events:none;z-index:0}
  .grid-ovl-rows{background-image:
      repeating-linear-gradient(to bottom, var(--ovl-faint) 0 1px, transparent 1px var(--row-h,40px)),
      repeating-linear-gradient(to bottom, var(--ovl-line) 0 1px, transparent 1px calc(var(--row-h,40px) * 5));}
  .grid-ovl-cols{display:flex}
  .grid-ovl-cols .gcol{flex:1 0 0;border-right:1px solid var(--ovl-line)}
  .grid-ovl-cols .gcol:first-child{border-left:1px solid var(--ovl-line)}
  .gcoord{position:absolute;font-size:11px;font-weight:700;color:var(--orange);
          opacity:.5;letter-spacing:.02em;font-variant-numeric:tabular-nums;pointer-events:none;z-index:0}
  .gcoord.col{top:-25px;transform:translateX(-50%)}
  .gcoord.row{left:-40px;transform:translateY(-50%);text-align:right;width:28px}

  .grid-block{position:absolute;box-sizing:border-box;z-index:1}
  .grid-block.img{background:transparent;border-radius:0}
  .gb-imgwrap{position:relative;width:100%;background:#f3e1d7;border-radius:2px;overflow:hidden}
  .gb-caption{margin-top:0.5px;font-size:11px;line-height:1.5;font-weight:400;
              color:var(--text-muted,#7a736c);text-wrap:pretty}
  .gb-caption em{font-style:italic}
  .grid-mobile .gb-caption{font-size:11px}
  .grid-block.vid{background:transparent;border-radius:0}
  .gb-vidwrap{position:relative;width:100%;background:#11100f;border-radius:2px;overflow:hidden}
  .grid-block.vid .gv-media{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
  .gv-facade{position:absolute;inset:0;width:100%;height:100%;background:#11100f;display:block}
  .gv-poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
  /* user-dropped poster sits ABOVE the auto thumbnail; transparent when empty so the
     auto thumbnail shows through, opaque (its image) once a poster is dropped */
  .gv-poster-slot{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:2}
  .gv-poster-slot::part(frame){background:transparent}
  .gv-poster-slot::part(ring){display:none}
  .gv-poster-slot::part(empty){opacity:0}
  .app.editing .gv-poster-slot::part(empty){opacity:1}
  .gv-play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:4;
               padding:0;margin:0;border:0;background:none;cursor:pointer}
  .app.editing .gv-play-btn{pointer-events:none}
  .gv-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
           width:62px;height:62px;border-radius:50%;border:1.5px solid var(--bg);
           background:rgba(17,16,15,.28);transition:background .15s ease}
  .gv-play-btn:hover .gv-play{background:rgba(17,16,15,.5)}
  .gv-play::after{content:"";position:absolute;top:50%;left:54%;transform:translate(-50%,-50%);
                  border-style:solid;border-width:9px 0 9px 15px;
                  border-color:transparent transparent transparent var(--bg)}
  .gv-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
            text-align:center;padding:18px;color:var(--orange);opacity:.6;font-size:13px;
            font-weight:500;background:var(--image-peach);border-radius:2px}
  .grid-block image-slot{width:100%;height:100%;display:block}
  .gb-imgwrap image-slot{width:100%;height:100%;display:block}
  .gb-text{font-weight:700;font-size:1.06rem;line-height:1.72;color:var(--text-dark)}
  .gb-text p{margin:0 0 var(--p-gap,14px)}
  .gb-text p:last-child{margin-bottom:0}
  .gb-text em{font-style:italic}
  .gb-text u{text-decoration:underline;text-underline-offset:2px}
  .gb-text strong{font-weight:700}
  /* inline links inside a text block: brand vermilion + hairline underline, gentle
     hover fade. A nested color span (applied via a swatch) overrides the color. */
  .gb-text a{color:var(--orange);text-decoration:underline;text-underline-offset:2px;
             cursor:pointer;transition:opacity .12s ease}
  .gb-text a:hover{opacity:.6}
  .editing .gb-text a{cursor:text}
  .gb-link{display:block;cursor:pointer;color:inherit;text-decoration:none;
           transition:opacity .12s ease}
  .gb-link:hover{opacity:.6}
  .editing .gb-link{cursor:default}
  .editing .gb-link:hover{opacity:1}

  /* edit affordances (only when Edit mode is on) */
  .app.editing .grid-block{cursor:grab}
  .app.editing .grid-block image-slot{pointer-events:none}
  .gb-hit{position:absolute;inset:0;z-index:3;display:none}
  .app.editing .gb-hit{display:block}
  .grid-block.sel{outline:2px solid var(--orange);outline-offset:3px}
  .gb-res{position:absolute;top:50%;right:-8px;width:14px;height:40px;transform:translateY(-50%);
          background:var(--orange);border-radius:4px;z-index:5;cursor:ew-resize;display:none;
          box-shadow:0 1px 4px rgba(0,0,0,.28)}
  .grid-block.sel .gb-res{display:block}
  .gb-tag{position:absolute;top:-21px;left:0;font-size:10px;font-weight:700;letter-spacing:.04em;
          color:var(--orange);opacity:.8;z-index:4;white-space:nowrap;display:none}
  .grid-block.sel .gb-tag{display:block}

  /* ---- MOTION ---- */
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fade{animation:fadeUp .35s ease both}

  /* ---- MOBILE GRID (rendered by MediaGrid in narrow mode) ---- */
  .grid-mobile{display:flex;flex-direction:column;gap:22px;width:100%;padding-bottom:60px}
  .grid-mobile .grid-block{position:relative !important;left:auto !important;top:auto !important;
    height:auto !important}
  .grid-mobile .grid-block image-slot{width:100%;display:block;height:100%}
  .grid-mobile .gb-text{font-size:15px !important;line-height:1.72}

  /* ---- MOBILE HAMBURGER MENU (shown < 820px) ---- */
  .topbar-mobile{display:none;justify-self:end;position:relative}
  .hamburger{font-size:26px;line-height:1;color:var(--orange);padding:6px 4px;
    background:none;border:0;cursor:pointer;transition:opacity .15s ease}
  .hamburger:hover{opacity:.6}
  .mobile-menu{position:absolute;top:calc(100% + 10px);right:0;min-width:210px;
    background:var(--bg);border:1px solid var(--border);border-radius:8px;
    display:flex;flex-direction:column;padding:8px 0;z-index:30}
  .mm-item,.mm-subitem{text-align:left;padding:11px 20px;font-size:1rem;color:var(--orange);
    background:none;border:0;cursor:pointer;transition:opacity .12s ease;font-family:inherit}
  .mm-item{display:flex;justify-content:space-between;align-items:center;gap:18px}
  .mm-item:hover,.mm-subitem:hover{opacity:.6}
  .mm-caret{font-size:.85rem;transition:transform .15s ease}
  .mm-caret.open{transform:translateY(2px) rotate(180deg)}
  .mm-sub{display:flex;flex-direction:column;border-top:1px solid var(--border);
    margin:4px 0 0;padding-top:4px}
  .mm-subitem{padding-left:34px;font-size:.94rem;opacity:.75}
  .mm-subitem.active{font-weight:700;opacity:1}

  /* ---- RESPONSIVE ---- */

<body>
  <div id="root"></div>

  <!-- Admin trigger — completely invisible 6×6px point, bottom-left corner.
       No cursor change, no hover, no visual trace. Only the owner knows it's here. -->
  <div onclick="__adminOpen()"
       style="position:fixed;bottom:10px;left:10px;z-index:9998;
              width:6px;height:6px;cursor:default;"></div>

  <!-- Admin password modal -->
  <div id="__admin_modal"
    style="display:none;position:fixed;inset:0;z-index:9999;
           background:rgba(245,240,235,0.88);
           align-items:center;justify-content:center;">
    <div style="background:#f5f0eb;border:1px solid #e0c4b8;border-radius:4px;
                padding:32px 36px;width:270px;
                display:flex;flex-direction:column;gap:16px;">
      <input id="__admin_pw" type="password" placeholder="password"
             style="font-family:'FoundersGrotesk','Space Grotesk',sans-serif;
                    font-size:15px;font-weight:400;color:#1a1a1a;
                    background:transparent;border:none;border-bottom:1px solid #e0c4b8;
                    outline:none;padding:6px 0;width:100%;transition:border-color .15s ease;"
             onfocus="this.style.borderColor='#e84a1a'"
             onblur="this.style.borderColor='#e0c4b8'"
             onkeydown="if(event.key==='Enter') __adminSubmit(); if(event.key==='Escape') __adminClose();" />
      <div id="__admin_err"
           style="font-size:11px;color:#e84a1a;opacity:0;
                  transition:opacity .15s ease;margin-top:-8px;height:12px;">
        incorrect password
      </div>
      <div style="display:flex;gap:10px;">
        <button onclick="__adminSubmit()"
                style="font-family:'FoundersGrotesk','Space Grotesk',sans-serif;
                       font-size:13px;font-weight:700;color:#f5f0eb;
                       background:#e84a1a;border:none;border-radius:3px;
                       padding:8px 20px;cursor:pointer;transition:opacity .15s ease;"
                onmouseover="this.style.opacity='.8'"
                onmouseout="this.style.opacity='1'">
          enter
        </button>
        <button onclick="__adminClose()"
                style="font-family:'FoundersGrotesk','Space Grotesk',sans-serif;
                       font-size:13px;font-weight:400;color:#e84a1a;
                       background:none;border:1px solid #e0c4b8;border-radius:3px;
                       padding:8px 20px;cursor:pointer;transition:opacity .15s ease;"
                onmouseover="this.style.opacity='.6'"
                onmouseout="this.style.opacity='1'">
          cancel
        </button>
      </div>
    </div>
  </div>

  <script>
    // Intercept __activateTweaks — any call (including console) is gated by __adminUnlocked.
    // tweaks-panel.jsx does window.__activateTweaks = fn; the setter stores the real fn.
    // The getter returns a wrapper that checks the flag, then resets it.
    (function() {
      var _real = null;
      Object.defineProperty(window, '__activateTweaks', {
        configurable: true,
        get: function() {
          return function() {
            if (window.__adminUnlocked) {
              window.__adminUnlocked = false;
              _real && _real();
            } else {
              __adminOpen();
            }
          };
        },
        set: function(fn) { _real = fn; }
      });
    })();

    function __adminOpen() {
      var m = document.getElementById('__admin_modal');
      m.style.display = 'flex';
      setTimeout(function(){ document.getElementById('__admin_pw').focus(); }, 60);
    }
    function __adminClose() {
      document.getElementById('__admin_modal').style.display = 'none';
      document.getElementById('__admin_pw').value = '';
      document.getElementById('__admin_err').style.opacity = '0';
    }
    function __adminSubmit() {
      var pw = document.getElementById('__admin_pw').value;
      if (pw === 'eEe4221519') {
        __adminClose();
        window.__adminUnlocked = true;   // one-time flag; wrapper resets it after use
        window.__activateTweaks && window.__activateTweaks();
      } else {
        document.getElementById('__admin_err').style.opacity = '1';
        document.getElementById('__admin_pw').value = '';
        document.getElementById('__admin_pw').focus();
      }
    }
    // Close on overlay click
    document.getElementById('__admin_modal').addEventListener('click', function(e) {
      if (e.target === this) __adminClose();
    });
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="image-slot.js"></script>

  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="TopBar.jsx"></script>
  <script type="text/babel" src="Home.jsx"></script>
  <script type="text/babel" src="Projects.jsx"></script>
  <script type="text/babel" src="MediaGrid.jsx"></script>
  <script type="text/babel" src="Detail.jsx"></script>
  <script type="text/babel" src="InfoGrid.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="GridTweaks.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
